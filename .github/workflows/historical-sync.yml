name: Gastamo Historical Sync

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2026-02-24'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2026-04-01'

jobs:
  historical-sync:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run historical sync
        shell: pwsh
        env:
          TOAST_CLIENT_ID:     ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_API_URL:       ${{ secrets.TOAST_API_URL }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          HIST_START_DATE:     ${{ github.event.inputs.start_date }}
          HIST_END_DATE:       ${{ github.event.inputs.end_date }}
        run: |
          ./scripts/gastamo-historical-sync.ps1

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-sync-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
